name: whoknows
version: 1.0.0
main: com.whoknows.WhoKnowsPlugin
api-version: '1.21'
author: WhoKnows Team
description: Un bot amigo que te acompaña en tus aventuras de Minecraft. Ideal para jugadores solitarios.
website: https://github.com/whoknows/plugin

commands:
  amigo:
    description: Habla con AmigoBot
    usage: /amigo <mensaje>
    aliases: [bot, companion]

permissions:
  whoknows.use:
    description: Permite usar el comando /amigo
    default: true
